# Override prefix to Ctrl-b for al-dev
unbind C-Space
set -g prefix C-b
bind C-b send-prefix

# drem-sx picker on Alt-g
bind -n M-g run-shell "drem-sx pick"

# Alt-Space to switch to previous session
bind -n M-Space switch-client -l

# Override theme: gruvbox instead of rose-pine
# set -g @plugin 'egel/tmux-gruvbox'
# set -g @tmux-gruvbox 'dark256'
