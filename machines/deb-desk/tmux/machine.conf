# Setting foreground and background colors
set -g status-fg '#638a58'
set -g status-bg '#691c1b'

# Override prefix to Ctrl-b for deb-desk
unbind C-Space
set -g prefix C-b
bind C-b send-prefix

# drem-sx picker on Alt-t for deb-desk
unbind -n M-g
bind -n M-t run-shell "drem-sx pick"

# Alt-b to switch to previous session
bind -n M-b switch-client -l
